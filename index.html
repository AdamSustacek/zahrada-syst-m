const ORDER = ["adam","laura","peter","marta"];
function chatKey(a,b){
  const s=[a,b].sort((x,y)=>(ORDER.indexOf(x)===-1?99:ORDER.indexOf(x))-(ORDER.indexOf(y)===-1?99:ORDER.indexOf(y)));
  return s[0]+"-"+s[1];
}
function calcHours(inT,outT){
  if(!inT||!outT) return "—";
  const [ih,im]=inT.split(":").map(Number),[oh,om]=outT.split(":").map(Number);
  const m=(oh*60+om)-(ih*60+im);
  if(m<=0) return "—";
  return `${Math.floor(m/60)}:${String(m%60).padStart(2,"0")}`;
}
function nowTime(){ return new Date().toTimeString().slice(0,5); }
function nowDate(){ return new Date().toISOString().split("T")[0]; }
function todayLabel(){ return new Date().toLocaleDateString("cs-CZ",{weekday:"long",day:"numeric",month:"long"}); }
function isAdmin(cu){ return !!(cu && (cu.role==="admin" || cu.login==="adam")); }
function canAccessAdmin(cu){ return isAdmin(cu); }
function asArray(v){ if(Array.isArray(v)) return v; if(v&&typeof v==="object") return Object.values(v); return []; }
function normalizeTasks(raw){ return asArray(raw); }
function normalizeAttendance(raw,users){
  if(!raw) return {};
  if(Array.isArray(raw)){
    const m={};
    Object.keys(users).forEach(k=>{m[k]=[];});
    const first=Object.keys(users).find(k=>users[k].role!=="admin");
    if(first) m[first]=raw;
    return m;
  }
  return raw;
}
function getUserRecords(all,login){ return (all&&all[login])||[]; }
function setUserRecords(all,login,records){ return {...(all||{}),[login]:records}; }
function makeUpdater(setter,docName,onSyncEvent){
  return function(v){
    setter(prev=>{
      const n=typeof v==="function"?v(prev):v;
      if(window.cloudSave){
        onSyncEvent&&onSyncEvent("saving");
        window.cloudSave(docName,n).then(function(){
          onSyncEvent&&onSyncEvent("saved");
        }).catch(function(err){
          onSyncEvent&&onSyncEvent("error",err.message||String(err));
        });
      }
      return n;
    });
  };
}

  sendBtn:{ width:44, height:44, borderRadius:12, background:"linear-gradient(135deg,#3a7d44,#2d5a27)", border:"none", color:"white", cursor:"pointer", fontSize:"1.1rem", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 },
  // announcement
  ann:{ background:"#fefcf7", border:"1px solid rgba(58,125,68,0.1)", borderLeft:"4px solid #3a7d44", borderRadius:14, padding:"1.25rem 1.5rem", marginBottom:"0.75rem" },
  meeting:{ background:"#fefcf7", border:"1px solid rgba(58,125,68,0.1)", borderLeft:"4px solid #1a5fa8", borderRadius:14, padding:"1.25rem 1.5rem", marginBottom:"0.75rem" },
  // modal
  modalBg:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.45)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", padding:"1rem" },
  modal:{ background:"#fefcf7", borderRadius:20, padding:"2rem", width:"100%", maxWidth:480, boxShadow:"0 20px 60px rgba(0,0,0,0.2)" },
  // notif
  notif:{ position:"fixed", bottom:"2rem", right:"2rem", background:"#2d5a27", color:"white", padding:"0.85rem 1.4rem", borderRadius:14, fontSize:"0.88rem", fontWeight:500, zIndex:9998, boxShadow:"0 8px 24px rgba(0,0,0,0.2)" },
  empty:{ textAlign:"center", padding:"2.5rem 1rem", color:"#8a9a8a" },
};

// ── SMALL COMPONENTS ─────────────────────────────────
function Avatar({initials, color, size=32}){
  return <div style={{...S.uavatar(null), width:size, height:size, fontSize:size*0.28, background:`linear-gradient(135deg,${color},#1a3d1a)`}}>{initials}</div>;
}

function Badge({type, children}){
  return <span style={S.badge(type)}>{children}</span>;
}

function Btn({type="primary", sm, onClick, children, style={}}){
  return <button style={{...S.btn(type), ...(sm?S.btnSm:{}), ...style}} onClick={onClick}>{children}</button>;
}

function Inp({value, onChange, placeholder, type="text", id}){
  return <input id={id} style={S.inp} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} type={type} />;
}

function Sel({value, onChange, options}){
  return <select style={S.inp} value={value} onChange={e=>onChange(e.target.value)}>
    {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
  </select>;
}

function Modal({open, onClose, title, children}){
  if(!open) return null;
  return <div style={S.modalBg} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={S.modal}>
      <div style={{fontFamily:"'DM Serif Display',serif", fontSize:"1.3rem", color:"#2d5a27", marginBottom:"1.25rem"}}>{title}</div>
      {children}
    </div>
  </div>;
}

function Notif({msg}){
  if(!msg) return null;
  return <div style={S.notif}>{msg}</div>;
}

  const isAdm = selRole==="admin";
  const roleUsers = Object.entries(users).filter(([,u])=>isAdm?u.role==="admin"&&u.active:u.role!=="admin"&&u.active);
  return (
    <div style={S.loginPage}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
      <div style={S.loginHero}>
        <div style={{...S.loginHeroOrb(1),width:320,height:320,top:-80,right:-60}}/>
        <div style={{...S.loginHeroOrb(2),width:200,height:200,bottom:40,left:-40}}/>
        <div style={{fontSize:"3rem",marginBottom:"0.75rem",position:"relative",zIndex:1}}>🌿</div>
        <h1 style={S.loginHeroTitle}>Zahradní systém</h1>
        <p style={S.loginHeroText}>Vše běží na webu v cloudu – úpravy z domácího PC se automaticky zobrazí i na stránce na jiném počítači.</p>
        <p style={{...S.loginHeroText,marginTop:"0.75rem",fontSize:"0.88rem",opacity:0.75}}>
          {fbReady&&fbOnline?"✅ Cloud připojen – synchronizace aktivní":"⏳ Připojuji cloud…"}
        </p>
        <div style={S.loginHeroFeat}>
          {["📋 Úkoly a plánování","💬 Interní zprávy","📅 Evidence docházky"].map(t=>(
            <div key={t} style={S.loginHeroFeatItem}><span style={{width:8,height:8,borderRadius:"50%",background:"rgba(255,255,255,0.7)",flexShrink:0}}/>{t}</div>
          ))}
        </div>
      </div>
      <div style={S.loginPanel}>
        <div style={S.loginFormWrap}>
          <div style={S.loginFormHead}>
            <h2 style={S.loginFormTitle}>{isAdm?"Přihlášení administrátora":"Přihlášení zaměstnance"}</h2>
            <p style={S.loginFormSub}>Zadejte své přihlašovací údaje</p>
          </div>
          <div style={S.loginCard}>
            <div style={S.roleTabs}>
              <button type="button" style={S.rtab(selRole==="admin",true)} onClick={()=>{setSelRole("admin");setLoginErr("");}}>👑 Administrátor</button>
              <button type="button" style={S.rtab(selRole==="employee",false)} onClick={()=>{setSelRole("employee");setLoginErr("");}}>🌱 Zaměstnanec</button>
            </div>
            {loginErr && <div style={S.err}>⚠️ {loginErr}</div>}
            <div style={S.fgroup}>
              <label style={S.flabel}>Uživatelské jméno</label>
              <div style={S.finputWrap}>
                <span style={S.finputIcon}>👤</span>
                <input style={S.finput} list="user-suggest" value={loginUser} onChange={e=>setLoginUser(e.target.value)}
                  placeholder={isAdm?"např. adam":"např. laura"} autoComplete="username"
                  onKeyDown={e=>e.key==="Enter"&&doLogin()}
                  onFocus={e=>{e.target.style.borderColor="#3a7d44";e.target.style.boxShadow="0 0 0 3px rgba(58,125,68,0.15)";}}
                  onBlur={e=>{e.target.style.borderColor="#e2e8e0";e.target.style.boxShadow="none";}}/>
                <datalist id="user-suggest">
                  {roleUsers.map(([login])=><option key={login} value={login}/>)}

            <div style={S.fgroup}>
              <label style={S.flabel}>Heslo</label>
              <div style={S.finputWrap}>
                <span style={S.finputIcon}>🔒</span>
                <input style={{...S.finput,paddingRight:"4.5rem"}} type={showPass?"text":"password"} value={loginPass}
                  onChange={e=>setLoginPass(e.target.value)} placeholder="••••••••" autoComplete="current-password"
                  onKeyDown={e=>e.key==="Enter"&&doLogin()}
                  onFocus={e=>{e.target.style.borderColor="#3a7d44";e.target.style.boxShadow="0 0 0 3px rgba(58,125,68,0.15)";}}
                  onBlur={e=>{e.target.style.borderColor="#e2e8e0";e.target.style.boxShadow="none";}}/>
                <button type="button" style={S.passToggle} onClick={()=>setShowPass(s=>!s)}>{showPass?"Skrýt":"Zobrazit"}</button>
              </div>
            </div>
            <button type="button" style={S.loginBtn(isAdm)} onClick={doLogin}
              onMouseOver={e=>{e.currentTarget.style.transform="translateY(-1px)";}}
              onMouseOut={e=>{e.currentTarget.style.transform="none";}}>
              Přihlásit se →

            <p style={{marginTop:"1.25rem",fontSize:"0.72rem",color:"#a0aea0",textAlign:"center",lineHeight:1.55}}>
              Používejte stejnou webovou adresu na všech PC<br/>
              (např. vase-domena.cz/index.html)
            </p>

        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────
function App(){
  // auth
  const [cu, setCu] = useState(null);
  const [selRole, setSelRole] = useState("admin");
  const [loginUser, setLoginUser] = useState("");
  const [loginPass, setLoginPass] = useState("");
  const [loginErr, setLoginErr] = useState("");
  const [fbReady, setFbReady] = useState(false);
  const [fbOnline, setFbOnline] = useState(!!window.db);
  const [syncStatus, setSyncStatus] = useState(window.db?"loading":"offline");
  const [lastSync, setLastSync] = useState("");
  const [syncErr, setSyncErr] = useState("");

  function onSyncEvent(st,msg){
    if(st==="saving") setSyncStatus("saving");
    else if(st==="saved"){
      setSyncStatus("ok");
      setLastSync(new Date().toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
      setSyncErr("");
      setFbOnline(true);
    }
    else if(st==="error"){
      setSyncStatus("error");
      setSyncErr(msg||"Chyba");
      setFbOnline(false);
      notify("⚠️ Nepodařilo se uložit do cloudu");
    }
  }

  // data
  const [users, setUsers] = useState(INIT_USERS);
  const [passwords, setPasswords] = useState(INIT_PASSWORDS);
  const [msgs, setMsgs] = useState(INIT_MESSAGES);
  const [tasks, setTasks] = useState(INIT_TASKS);
  const [attendance, setAttendance] = useState(INIT_ATTENDANCE);
  const [announcements, setAnnouncements] = useState(INIT_ANNOUNCEMENTS);
  const [meetings, setMeetings] = useState(INIT_MEETINGS);

  // nav
  const [page, setPage] = useState("dashboard");
  const [selChat, setSelChat] = useState(null);
  const [notif, setNotif] = useState("");
  const notifRef = useRef();

  // checkin
  const [checkedIn, setCheckedIn] = useState(false);

  /* Firebase – data v cloudu, stejná na všech PC a na webu */
  useEffect(()=>{
    if(!window.db){
      setFbReady(true);
      setSyncStatus("offline");
      return;
    }
    const db=window.db;
    const seeds=[
      ["users",INIT_USERS],["passwords",INIT_PASSWORDS],["msgs",INIT_MESSAGES],
      ["tasks",INIT_TASKS],["attendance",INIT_ATTENDANCE],
      ["announcements",INIT_ANNOUNCEMENTS],["meetings",INIT_MEETINGS],
    ];
    const setters={users:setUsers,passwords:setPasswords,msgs:setMsgs,tasks:setTasks,
                   attendance:setAttendance,announcements:setAnnouncements,meetings:setMeetings};
    let loaded=0;
    const unsubs=seeds.map(([name,fallback])=>
      db.collection("app").doc(name).onSnapshot(function(doc){
        if(doc.exists){
          let data=doc.data();
          if(name==="attendance") data=normalizeAttendance(data,INIT_USERS);
          if(name==="tasks") data=normalizeTasks(data);
          if(name==="announcements"||name==="meetings") data=asArray(data);
          setters[name](data);
        }else{
          window.cloudSave(name,fallback);
        }
        loaded++;
        if(loaded>=seeds.length){
          setFbReady(true);
          setFbOnline(true);
          setSyncStatus("ok");
          setLastSync(new Date().toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
        }
      },function(err){
        console.error("Snapshot error:",name,err);
        setSyncStatus("error");
        setSyncErr(err.message||String(err));
      })
    );
    return ()=>unsubs.forEach(f=>f());
  },[]);

  // updaters
  const setUsersCloud = makeUpdater(setUsers,"users",onSyncEvent);
  const setPasswordsCloud = makeUpdater(setPasswords,"passwords",onSyncEvent);
  const setMsgsCloud = makeUpdater(setMsgs,"msgs",onSyncEvent);
  const setTasksCloud = makeUpdater(setTasks,"tasks",onSyncEvent);
  const setAttendanceCloud = makeUpdater(setAttendance,"attendance",onSyncEvent);
  const setAnnouncementsCloud = makeUpdater(setAnnouncements,"announcements",onSyncEvent);
  const setMeetingsCloud = makeUpdater(setMeetings,"meetings",onSyncEvent);

  // auto check state
  useEffect(()=>{
    if(!cu) return;
    const recs=getUserRecords(attendance,cu.login);
    const today=nowDate();
    const t=recs.find(r=>r.date===today);
    setCheckedIn(!!(t && t.in && !t.out));
  },[cu, attendance]);

  function notify(msg){
    setNotif(msg);
    clearTimeout(notifRef.current);
    notifRef.current=setTimeout(()=>setNotif(""),3500);
  }

  function doLogin(){
    const u=users[loginUser.toLowerCase().trim()];
    if(!u || !u.active){ setLoginErr("Uživatel neexistuje."); return; }
    const isAdmRole = selRole==="admin";
    if(isAdmRole && u.role!=="admin"){ setLoginErr("Tento uživatel nemá práva administrátora."); return; }
    if(!isAdmRole && u.role==="admin"){ setLoginErr("Administrátor se musí přihlásit přes kartu Administrátor."); return; }
    
    if(passwords[loginUser.toLowerCase().trim()] !== loginPass){
      setLoginErr("Nesprávné heslo.");
      return;
    }
    setLoginErr("");
    setCu({login:loginUser.toLowerCase().trim(), ...u});
    setPage("dashboard");
    notify(`Vítejte, ${u.name} 👋`);
  }

  function doLogout(){
    setCu(null);
    setLoginPass("");
    setPage("dashboard");
    setSelChat(null);
  }

  // Akce Docházka
  function toggleAttendance(){
    const today=nowDate();
    const time=nowTime();
    const recs=[...(getUserRecords(attendance,cu.login))];
    const idx=recs.findIndex(r=>r.date===today);

    if(!checkedIn){
      if(idx===-1){
        recs.unshift({date:today, in:time, out:"", status:"ok"});
      }else{
        recs[idx]={...recs[idx], in:time, out:""};
      }
      setAttendanceCloud(setUserRecords(attendance,cu.login,recs));
      notify("⏳ Příchod úspěšně zaznamenán");
    }else{
      if(idx!==-1){
        recs[idx]={...recs[idx], out:time};
        setAttendanceCloud(setUserRecords(attendance,cu.login,recs));
        notify("✅ Odchod úspěšně zaznamenán");
      }
    }
  }

  // Modaly správce
  const [addModal, setAddModal] = useState(false);
  const [nName, setNName] = useState("");
  const [nLogin, setNLogin] = useState("");
  const [nPass, setNPass] = useState("");
  const [nPos, setNPos] = useState("");
  const [nShift, setNShift] = useState("8:00–16:30");

  function addUser(){
    const log=nLogin.toLowerCase().trim();
    if(!nName||!log||!nPass){ alert("Vyplňte jméno, login a heslo."); return; }
    if(users[log]){ alert("Tento login již existuje."); return; }
    
    const colors=["#1a5fa8","#3a7d44","#993556","#4b2382","#d96b27","#157a70"];
    const c=colors[Math.floor(Math.random()*colors.length)];
    const ini=nName.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);

    setUsersCloud({...users, [log]:{name:nName, role:"employee", initials:ini, pos:nPos||"Zaměstnanec", shift:nShift, color:c, active:true}});
    setPasswordsCloud({...passwords, [log]:nPass});
    setAddModal(false);
    setNName("");setNLogin("");setNPass("");setNPos("");
    notify("👤 Nový zaměstnanec přidán");
  }

  const [editModal, setEditModal] = useState(false);
  const [editLog, setEditLog] = useState("");
  const [eName, setEName] = useState("");
  const [ePos, setEPos] = useState("");
  const [eShift, setEShift] = useState("");
  const [ePass, setEPass] = useState("");

  function openEdit(log){
    const u=users[log];
    setEditLog(log);
    setEName(u.name);
    setEPos(u.pos);
    setEShift(u.shift);
    setEPass(passwords[log]||"");
    setEditModal(true);
  }

  function saveUser(){
    if(!eName){ alert("Jméno nesmí být prázdné."); return; }
    const u=users[editLog];
    setUsersCloud({...users, [editLog]:{...u, name:eName, pos:ePos, shift:eShift}});
    if(ePass) setPasswordsCloud({...passwords, [editLog]:ePass});
    setEditModal(false);
    notify("✏️ Údaje zaměstnance změněny");
  }

  function toggleUserActive(log){
    const u=users[log];
    const act=!u.active;
    setUsersCloud({...users, [log]:{...u, active:act}});
    notify(act?"👤 Zaměstnanec aktivován":"❌ Zaměstnanec deaktivován");
  }

  // Modaly úkolů
  const [tModal, setTModal] = useState(false);
  const [tName, setTName] = useState("");
  const [tWho, setTWho] = useState("");
  const [tPri, setTPri] = useState("medium");
  const [tDesc, setTDesc] = useState("");

  function addTask(){
    if(!tName) return;
    const n={id:Date.now(), name:tName, who:tWho||"Všichni", pri:tPri, date:nowDate(), done:false, desc:tDesc};
    setTasksCloud([n, ...tasks]);
    setTModal(false); setTName(""); setTDesc("");
    notify("📋 Úkol úspěšně vytvořen");
  }

  function toggleTask(id){
    setTasksCloud(tasks.map(t=>t.id===id?{...t, done:!t.done}:t));
    notify("📋 Stav úkolu upraven");
  }

  function deleteTask(id){
    if(confirm("Smazat tento úkol?")) setTasksCloud(tasks.filter(t=>t.id!==id));
  }

  // Oznámení / Porady
  const [annTitle, setAnnTitle] = useState("");
  const [annText, setAnnText] = useState("");
  function addAnn(){
    if(!annTitle||!annText) return;
    const n={id:Date.now(), author:cu.name, time:new Date().toLocaleString("cs-CZ",{day:"numeric",month:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}), title:annTitle, text:annText};
    setAnnouncementsCloud([n, ...announcements]);
    setAnnTitle(""); setAnnText("");
    notify("📢 Oznámení publikováno");
  }
  function delAnn(id){ setAnnouncementsCloud(announcements.filter(a=>a.id!==id)); }

  const [meetTitle, setMeetTitle] = useState("");
  const [meetDate, setMeetDate] = useState("");
  const [meetTime, setMeetTime] = useState("");
  const [meetPlace, setMeetPlace] = useState("");
  const [meetAtt, setMeetAtt] = useState("Všichni");
  function addMeet(){
    if(!meetTitle||!meetDate||!meetTime) return;
    const n={id:Date.now(), title:meetTitle, date:meetDate, time:meetTime, place:meetPlace||"Areál", desc:"", attendees:meetAtt};
    setMeetingsCloud([n, ...meetings]);
    setMeetTitle(""); setMeetDate(""); setMeetTime(""); setMeetPlace("");
    notify("📅 Porada byla naplánována");
  }
  function delMeet(id){ setMeetingsCloud(meetings.filter(m=>m.id!==id)); }

  // Chat zprávy
  const [chatInp, setChatInp] = useState("");
  const msgsEndRef = useRef();

  useEffect(()=>{
    if(page==="chat" && msgsEndRef.current){
      msgsEndRef.current.scrollIntoView({behavior:"smooth"});
    }
  },[page, msgs, selChat]);

  function sendChat(){
    if(!chatInp.trim()||!selChat) return;
    const k=chatKey(cu.login, selChat);
    const curr=asArray(msgs[k]);
    const n={from:cu.login, text:chatInp.trim(), time:nowTime()};
    setMsgsCloud({...msgs, [k]:[...curr, n]});
    setChatInp("");
  }

  if(!cu){
    return <LoginScreen selRole={selRole} setSelRole={setSelRole} loginUser={loginUser} setLoginUser={setLoginUser} loginPass={loginPass} setLoginPass={setLoginPass} loginErr={loginErr} setLoginErr={setLoginErr} doLogin={doLogin} users={users} fbOnline={fbOnline} fbReady={fbReady} />;
  }

  const activeChatsCount=Object.keys(users).filter(k=>k!==cu.login&&users[k].active).reduce((acc,k)=>{
    const key=chatKey(cu.login,k);
    const arr=asArray(msgs[key]);
    return acc+(arr.length>0?1:0);
  },0);

  return (
    <div style={S.app}>
      <Notif msg={notif} />
      
      {/* TOPBAR */}
      <div style={S.topbar}>
        <div style={S.topBrand}>🌿 Zahradní systém <span style={{fontSize:"0.75rem",fontFamily:"sans-serif",fontWeight:400,opacity:0.6}}>v1.4.0</span></div>
        <div style={S.topRight}>
          <div style={{fontSize:"0.75rem",color:syncStatus==="ok"?"#2d5a27":syncStatus==="saving"?"#b8860b":"#dc2626",textAlign:"right",fontFamily:"sans-serif"}}>
            {syncStatus==="ok"&&`• Cloud synchronizován (${lastSync})`}
            {syncStatus==="saving"&&"• Ukládám změny do cloudu…"}
            {syncStatus==="loading"&&"• Stahuji cloud data…"}
            {syncStatus==="error"&&`• Chyba cloudu: ${syncErr}`}
            {syncStatus==="offline"&&"• Lokální režim (bez cloudu)"}
          </div>
          <div style={S.ubadge}>
            <Avatar initials={cu.initials} color={cu.color} size={32} />
            <span style={S.uname}>{cu.name}</span>
            <span style={S.urole(isAdmin(cu))}>{isAdmin(cu)?"Správce":"Zaměstnanec"}</span>
          </div>
          <button style={S.logoutBtn} onClick={doLogout}>Odhlásit se</button>
        </div>
      </div>

      <div style={{display:"flex", minHeight:"calc(100vh - 64px)"}}>
        {/* SIDEBAR */}
        <div style={S.sidebar}>
          <button style={S.nbtn(page==="dashboard")} onClick={()=>setPage("dashboard")}>🏠 Nástěnka</button>
          <button style={S.nbtn(page==="tasks")} onClick={()=>setPage("tasks")}>📋 Úkoly ({tasks.filter(t=>!t.done).length})</button>
          <button style={S.nbtn(page==="chat")} onClick={()=>{setPage("chat");if(!selChat){const f=Object.keys(users).find(k=>k!==cu.login&&users[k].active);if(f)setSelChat(f);}}}>💬 Zprávy {activeChatsCount>0&&<span style={S.nbadge}>{activeChatsCount}</span>}</button>
          <button style={S.nbtn(page==="attendance")} onClick={()=>setPage("attendance")}>📅 Docházka</button>
          
          {canAccessAdmin(cu) && (
            <>
              <div style={S.slabel}>Správa firmy</div>
              <button style={S.nbtn(page==="admin-users")} onClick={()=>setPage("admin-users")}>👥 Zaměstnanci</button>
              <button style={S.nbtn(page==="admin-attendance")} onClick={()=>setPage("admin-attendance")}>📊 Přehled docházky</button>
            </>
          )}
        </div>

        {/* CONTENT CONTENT */}
        <div style={S.content}>
          
          {/* DASHBOARD */}
          {page==="dashboard" && (
            <div>
              <div style={S.welcome}>
                <h2 style={S.wh2}>Krásný den, {cu.name}!</h2>
                <p style={S.wp}>Dnes je {todayLabel()}. Vítejte v interním portálu.</p>
              </div>

              <div style={S.statGrid}>
                <div style={S.statCard}>
                  <div style={S.statLabel}>Moje docházka</div>
                  <div style={{...S.statValue, fontSize:"1.25rem", marginTop:"0.6rem"}}>
                    <Btn type={checkedIn?"danger":"primary"} sm onClick={toggleAttendance}>
                      {checkedIn?`🔴 Odhlásit odchod`:`🟢 Zapsat příchod`}
                    </Btn>
                  </div>
                  <div style={S.statSub}>{checkedIn?`Na směně od ${getUserRecords(attendance,cu.login)[0]?.in||""}`:`Mimo směnu`}</div>
                </div>
                <div style={S.statCard}>
                  <div style={S.statLabel}>Nedokončené úkoly</div>
                  <div style={S.statValue}>{tasks.filter(t=>!t.done&&(t.who==="Všichni"||t.who===cu.name||cu.role==="admin")).length}</div>
                  <div style={S.statSub}>přiděleno vám / všem</div>
                </div>
                <div style={S.statCard}>
                  <div style={S.statLabel}>Aktivní lidé</div>
                  <div style={S.statValue}>{Object.values(users).filter(u=>u.active).length}</div>
                  <div style={S.statSub}>v celém týmu</div>
                </div>
              </div>

              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"1.5rem"}}>
                <div>
                  <div style={S.scard}>
                    <h3 style={S.scardTitle}>📢 Firemní nástěnka & Oznámení</h3>
                    {isAdmin(cu) && (
                      <div style={{...S.addForm, padding:"1rem", marginBottom:"1rem"}}>
                        <Inp value={annTitle} onChange={setAnnTitle} placeholder="Předmět / Titulek" />
                        <div style={{height:8}}/>
                        <textarea style={{...S.inp, height:60, resize:"none"}} value={annText} onChange={e=>setAnnText(e.target.value)} placeholder="Zde napište vzkaz pro zaměstnance..." />
                        <div style={{marginTop:8, textAlign:"right"}}><Btn sm onClick={addAnn}>Zveřejnit</Btn></div>
                      </div>
                    )}
                    {announcements.length===0?<div style={S.empty}>Žádná oznámení.</div>:
                      announcements.map(a=>(
                        <div key={a.id} style={S.ann}>
                          <div style={{display:"flex",justifyKey:"space-between",alignItems:"flex-start"}}>
                            <strong style={{color:"#1a3d1a",fontSize:"0.95rem"}}>{a.title}</strong>
                            {isAdmin(cu)&&<button style={{background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontSize:"0.8rem"}} onClick={()=>delAnn(a.id)}>Smazat</button>}
                          </div>
                          <p style={{fontSize:"0.88rem",margin:"0.3rem 0 0.6rem",lineHeight:1.4}}>{a.text}</p>
                          <div style={{fontSize:"0.72rem",color:"#8a9a8a"}}>{a.author} · {a.time}</div>
                        </div>
                      ))
                    }
                  </div>
                </div>

                <div>
                  <div style={S.scard}>
                    <h3 style={S.scardTitle}>📅 Nadcházející porady a akce</h3>
                    {isAdmin(cu) && (
                      <div style={{...S.addForm, padding:"1rem", marginBottom:"1rem"}}>
                        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:6,marginBottom:6}}>
                          <Inp value={meetTitle} onChange={setMeetTitle} placeholder="Název porady" />
                          <input type="date" style={S.inp} value={meetDate} onChange={e=>setMeetDate(e.target.value)} />
                          <input type="time" style={S.inp} value={meetTime} onChange={e=>setMeetTime(e.target.value)} />
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                          <Inp value={meetPlace} onChange={setMeetPlace} placeholder="Místo (výchozí: Areál)" />
                          <Inp value={meetAtt} onChange={setMeetAtt} placeholder="Kdo (výchozí: Všichni)" />
                        </div>
                        <div style={{marginTop:8, textAlign:"right"}}><Btn sm onClick={addMeet}>Naplánovat</Btn></div>
                      </div>
                    )}
                    {meetings.length===0?<div style={S.empty}>Nejsou plánovány žádné akce.</div>:
                      meetings.map(m=>(
                        <div key={m.id} style={S.meeting}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <span style={S.tpill}>{m.time} u {m.place}</span>
                            {isAdmin(cu)&&<button style={{background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontSize:"0.8rem"}} onClick={()=>delMeet(m.id)}>Smazat</button>}
                          </div>
                          <h4 style={{fontFamily:"sans-serif",margin:"0.4rem 0 0.2rem",color:"#1a5fa8"}}>{m.title}</h4>
                          <div style={{fontSize:"0.75rem",color:"#5a6a5a"}}>Kdy: <strong>{m.date.split("-").reverse().join(".")}</strong> · Účastníci: {m.attendees}</div>
                        </div>
                      ))
                    }
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* TASKS */}
          {page==="tasks" && (
            <div>
              <div style={S.pageTitle}>
                <span>📋 Přehled firemních úkolů</span>
                <Btn onClick={()=>setTModal(true)}>+ Nový úkol</Btn>
              </div>
              
              <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:"1.25rem"}}>
                {tasks.length===0&&<div style={{gridColumn:"1/-1"}}><div style={S.empty}>Žádné úkoly k zobrazení.</div></div>}
                {tasks.map(t=>(
                  <div key={t.id} style={S.tcard(t.pri, t.done)}>
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"0.5rem"}}>
                      <Badge type={t.pri==="high"?"red":t.pri==="medium"?"orange":"green"}>
                        {t.pri==="high"?"Vysoká prioritou":t.pri==="medium"?"Střední prioritou":"Nízká prioritou"}
                      </Badge>
                      <div style={{display:"flex",gap:8}}>
                        <input type="checkbox" checked={t.done} onChange={()=>toggleTask(t.id)} style={{width:16,height:16,cursor:"pointer"}} />
                        {isAdmin(cu)&&<button style={{background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontSize:"1rem",lineHeight:1}} onClick={()=>deleteTask(t.id)}>×</button>}
                      </div>
                    </div>
                    <h4 style={{fontSize:"1.05rem",textDecoration:t.done?"line-through":"none",color:t.done?"#8a9a8a":"#1a3d1a",marginBottom:"0.25rem"}}>{t.name}</h4>
                    {t.desc&&<p style={{fontSize:"0.8rem",color:"#6b7a6b",marginBottom:"0.75rem"}}>{t.desc}</p>}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid rgba(0,0,0,0.05)",paddingTop:"0.5rem",fontSize:"0.75rem",color:"#8a9a8a"}}>
                      <span>Přiřazeno: <strong>{t.who}</strong></span>
                      <span>{t.date.split("-").reverse().join(".")}</span>
                    </div>
                  </div>
                ))}
              </div>

              <Modal open={tModal} onClose={()=>setTModal(false)} title="📋 Vytvořit nový firemní úkol">
                <div style={S.fgroup}>
                  <label style={S.flabel}>Znění úkolu *</label>
                  <Inp value={tName} onChange={setTName} placeholder="např. Přesadit růže ve skleníku" />
                </div>
                <div style={S.formRow}>
                  <div>
                    <label style={S.flabel}>Odpovědná osoba</label>
                    <select style={S.inp} value={tWho} onChange={e=>setTWho(e.target.value)}>
                      <option value="Všichni">Všichni zaměstnanci</option>
                      {Object.values(users).filter(u=>u.active).map(u=><option key={u.name} value={u.name}>{u.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={S.flabel}>Priorita</label>
                    <select style={S.inp} value={tPri} onChange={e=>setTPri(e.target.value)}>
                      <option value="low">🟢 Nízká</option>
                      <option value="medium">🟡 Střední</option>
                      <option value="high">🔴 Vysoká</option>
                    </select>
                  </div>
                </div>
                <div style={S.fgroup}>
                  <label style={S.flabel}>Bližší popis / detaily</label>
                  <textarea style={{...S.inp,height:60,resize:"none"}} value={tDesc} onChange={e=>setTDesc(e.target.value)} placeholder="Nepovinné upřesnění úkolu..." />
                </div>
                <div style={{display:"flex",gap:"0.75rem",marginTop:"0.5rem"}}>
                  <Btn onClick={addTask}>Vytvořit</Btn>
                  <Btn type="outline" onClick={()=>setTModal(false)}>Zrušit</Btn>
                </div>
              </Modal>
            </div>
          )}

          {/* CHAT */}
          {page==="chat" && (
            <div>
              <div style={S.pageTitle}>💬 Vnitrofiremní chat / Interní zprávy</div>
              <div style={S.chatLayout}>
                <div style={S.chatUsers}>
                  <div style={{fontSize:"0.7rem",fontWeight:700,color:"#b0bab0",textTransform:"uppercase",letterSpacing:1,marginBottom:8,paddingLeft:4}}>Kolegové</div>
                  {Object.entries(users).filter(([k,u])=>k!==cu.login&&u.active).map(([k,u])=>(
                    <div key={k} style={S.chatUser(selChat===k)} onClick={()=>setSelChat(k)}>
                      <Avatar initials={u.initials} color={u.color} size={28} />
                      <div style={{flex:1,overflow:"hidden"}}>
                        <div style={{fontSize:"0.85rem",fontWeight:500,color:"#1a3d1a",textOverflow:"ellipsis",whiteSpace:"nowrap",overflow:"hidden"}}>{u.name}</div>
                        <div style={{fontSize:"0.7rem",color:"#8a9a8a"}}>{u.role==="admin"?"Správce":u.pos}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div style={S.chatMain}>
                  {selChat ? (
                    <>
                      <div style={{display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid rgba(58,125,68,0.1)",paddingBottom:"0.75rem",marginBottom:"0.5rem"}}>
                        <Avatar initials={users[selChat]?.initials} color={users[selChat]?.color} size={32} />
                        <div>
                          <h4 style={{fontSize:"0.95rem",color:"#1a3d1a"}}>{users[selChat]?.name}</h4>
                          <span style={{fontSize:"0.72rem",color:"#8a9a8a"}}>{users[selChat]?.pos}</span>
                        </div>
                      </div>
                      <div style={S.chatMsgs}>
                        {asArray(msgs[chatKey(cu.login, selChat)]).length===0 && <div style={{...S.empty,marginTop:"auto",marginBottom:"auto"}}>Žádné předchozí zprávy. Začněte konverzaci!</div>}
                        {asArray(msgs[chatKey(cu.login, selChat)]).map((m,i)=>(
                          <div key={i} style={S.mrow(m.from===cu.login)}>
                            <div style={S.mbubble(m.from===cu.login)}>
                              <div>{m.text}</div>
                              <div style={{...S.mtime,textAlign:m.from===cu.login?"right":"left",color:m.from===cu.login?"rgba(255,255,255,0.6)":"#b0bab0"}}>{m.time}</div>
                            </div>
                          </div>
                        ))}
                        <div ref={msgsEndRef} />
                      </div>
                      <div style={S.cinputWrap}>
                        <textarea style={S.cinput} rows={1} value={chatInp} onChange={e=>setChatInp(e.target.value)} placeholder={`Napište zprávu pro: ${users[selChat]?.name}...`} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}}} />
                        <button style={S.sendBtn} onClick={sendChat}>➔</button>
                      </div>
                    </>
                  ) : <div style={S.empty}>Zvolte kolegu ze seznamu vlevo pro zahájení chatu.</div>}
                </div>
              </div>
            </div>
          )}

          {/* ATTENDANCE */}
          {page==="attendance" && (
            <div>
              <div style={S.pageTitle}>📅 Moje osobní docházka</div>
              
              <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:"1.5rem",alignItems:"start"}}>
                <div style={S.scard}>
                  <h4 style={{fontSize:"0.95rem",color:"#2d5a27",marginBottom:"0.5rem"}}>Záznam přítomnosti</h4>
                  <p style={{fontSize:"0.82rem",color:"#6b7a6b",marginBottom:"1.25rem",lineHeight:1.45}}>Zde evidujete příchod na pracoviště a odchod domů pro výpočet odpracovaných hodin.</p>
                  <Btn type={checkedIn?"danger":"primary"} style={{width:"100%",justifyContent:"center",padding:"0.8rem"}} onClick={toggleAttendance}>
                    {checkedIn?"🔴 Odhlásit odchod (Konec)":"🟢 Zapsat příchod (Start)"}
                  </Btn>
                  <div style={{textAlign:"center",fontSize:"0.78rem",color:"#8a9a8a",marginTop:"0.75rem"}}>
                    Aktuální stav: <strong>{checkedIn?"Pracujete (Směna běží)":"Nejste na směně"}</strong>
                  </div>
                </div>

                <div style={S.scard}>
                  <h3 style={S.scardTitle}>Přehled záznamů za tento měsíc</h3>
                  <div style={S.tblWrap}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead>
                        <tr>
                          <th style={S.th}>Datum</th>
                          <th style={S.th}>Příchod</th>
                          <th style={S.th}>Odchod</th>
                          <th style={S.th}>Odpracováno</th>
                          <th style={S.th}>Stav</th>
                        </tr>
                      </thead>
                      <tbody>
                        {getUserRecords(attendance,cu.login).length===0?<tr><td colSpan={5} style={{...S.td,textAlign:"center",color:"#8a9a8a",padding:"2rem"}}>Žádné záznamy o docházce.</td></tr>:
                          getUserRecords(attendance,cu.login).map((r,i)=>(
                            <tr key={i}>
                              <td style={{...S.td,fontWeight:500}}>{r.date.split("-").reverse().join(".")}</td>
                              <td style={S.td}>{r.in||"—"}</td>
                              <td style={S.td}>{r.out||"—"}</td>
                              <td style={{...S.td,fontWeight:600,color:"#2d5a27"}}>{calcHours(r.in,r.out)}</td>
                              <td style={S.td}>
                                <Badge type={r.status==="ok"?"green":r.status==="late"?"orange":"red"}>
                                  {r.status==="ok"?"V pořádku":r.status==="late"?"Pozdní příchod":"Absence"}
                                </Badge>
                              </td>
                            </tr>
                          ))
                        }
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ADMIN: USERS */}
          {page === "admin-users" && canAccessAdmin(cu) && (
            <div>
              <div style={S.pageTitle}>
                <span>👥 Správa zaměstnanců a přístupů</span>
                <Btn onClick={()=>setAddModal(true)}>+ Nový zaměstnanec</Btn>
              </div>

              <div style={S.scard}>
                <div style={S.tblWrap}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr>
                        <th style={S.th}>Zástupce</th>
                        <th style={S.th}>Uživatelské jméno</th>
                        <th style={S.th}>Heslo</th>
                        <th style={S.th}>Pracovní pozice</th>
                        <th style={S.th}>Obvyklá směna</th>
                        <th style={S.th}>Role</th>
                        <th style={S.th}>Stav</th>
                        <th style={S.th} style={{textAlign:"right"}}>Akce</th>
                      </tr>
                    </thead>
                    <tbody>
                      {Object.entries(users).map(([log,u])=>(
                        <tr key={log} style={{opacity:u.active?1:0.5}}>
                          <td style={S.td}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <Avatar initials={u.initials} color={u.color} size={26} />
                              <strong>{u.name}</strong>
                            </div>
                          </td>
                          <td style={S.td}><code>{log}</code></td>
                          <td style={S.td}><code>{passwords[log]||"••••"}</code></td>
                          <td style={S.td}>{u.pos||"—"}</td>
                          <td style={S.td}>{u.shift||"—"}</td>
                          <td style={S.td}><span style={S.urole(u.role==="admin")}>{u.role==="admin"?"Admin":"Zaměstnanec"}</span></td>
                          <td style={S.td}><Badge type={u.active?"green":"grey"}>{u.active?"Aktivní":"Zablokován"}</Badge></td>
                          <td style={{...S.td,textAlign:"right"}}>
                            <Btn type="outline" sm onClick={()=>openEdit(log)} style={{marginRight:6}}>Upravit</Btn>
                            {log!=="adam" && log!==cu.login && (
                              <Btn type={u.active?"danger":"primary"} sm onClick={()=>toggleUserActive(log)}>
                                {u.active?"Zablokovat":"Aktivovat"}
                              </Btn>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Modal Přidat */}
              <Modal open={addModal} onClose={()=>setAddModal(false)} title="👥 Přidat nového zaměstnance">
                <div style={S.fgroup}>
                  <label style={S.flabel}>Celé jméno (např. Jana Nováková) *</label>
                  <Inp value={nName} onChange={setNName} placeholder="Celé jméno" />
                </div>
                <div style={S.formRow}>
                  <div>
                    <label style={S.flabel}>Přihlašovací jméno (login) *</label>
                    <Inp value={nLogin} onChange={setNLogin} placeholder="např. jana" />
                  </div>
                  <div>
                    <label style={S.flabel}>Přihlašovací heslo *</label>
                    <Inp value={nPass} onChange={setNPass} placeholder="Heslo" />
                  </div>
                </div>
                <div style={S.formRow}>
                  <div>
                    <label style={S.flabel}>Pracovní pozice</label>
                    <Inp value={nPos} onChange={setNPos} placeholder="např. Pokladní / Zahradník" />
                  </div>
                  <div>
                    <label style={S.flabel}>Pracovní doba (Směna)</label>
                    <Inp value={nShift} onChange={setNShift} placeholder="8:00–16:30" />
                  </div>
                </div>
                <div style={{display:"flex",gap:"0.75rem",marginTop:"0.5rem"}}>
                  <Btn onClick={addUser}>Přidat</Btn>
                  <Btn type="outline" onClick={()=>setAddModal(false)}>Zrušit</Btn>
                </div>
              </Modal>

              {/* Modal Upravit */}
              <Modal open={editModal} onClose={()=>setEditModal(false)} title="✏️ Upravit údaje zaměstnance">
                <div style={S.fgroup}>
                  <label style={S.flabel}>Celé jméno *</label>
                  <Inp value={eName} onChange={setEName} placeholder="Celé jméno" />
                </div>
                <div style={S.formRow}>
                  <div>
                    <label style={S.flabel}>Pracovní pozice</label>
                    <Inp value={ePos} onChange={setEPos} placeholder="Pozice" />
                  </div>
                  <div>
                    <label style={S.flabel}>Pracovní doba (Směna)</label>
                    <Inp value={eShift} onChange={setEShift} placeholder="Směna" />
                  </div>
                </div>
                <div style={S.fgroup}>
                  <label style={S.flabel}>Změnit heslo (ponechte prázdné pro zachování stávajícího)</label>
                  <Inp value={ePass} onChange={setEPass} placeholder="Nové heslo" type="text" />
                </div>
                <div style={{display:"flex",gap:"0.75rem",marginTop:"0.5rem"}}>
                  <Btn onClick={saveUser}>Uložit změny</Btn>
                  <Btn type="outline" onClick={()=>setEditModal(false)}>Zrušit</Btn>
                </div>
              </Modal>
            </div>
          )}

          {/* ADMIN: ATTENDANCE */}
          {page === "admin-attendance" && canAccessAdmin(cu) && (
            <div>
              <div style={S.pageTitle}>📊 Celkový přehled docházky týmu</div>
              
              {Object.entries(users).filter(([,u])=>u.role!=="admin").map(([log,u])=>{
                const recs=getUserRecords(attendance,log);
                return (
                  <div key={log} style={S.scard}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1rem"}}>
                      <Avatar initials={u.initials} color={u.color} size={32} />
                      <div>
                        <h4 style={{fontSize:"1.05rem",color:"#1a3d1a"}}>{u.name}</h4>
                        <span style={{fontSize:"0.78rem",color:"#8a9a8a"}}>{u.pos} · Smluvní doba: {u.shift}</span>
                      </div>
                    </div>

                    <div style={S.tblWrap}>
                      <table style={{width:"100%",borderCollapse:"collapse"}}>
                        <thead>
                          <tr>
                            <th style={S.th}>Datum</th>
                            <th style={S.th}>Příchod (In)</th>
                            <th style={S.th}>Odchod (Out)</th>
                            <th style={S.th}>Odpracovaný čas</th>
                            <th style={S.th}>Vyhodnocení</th>
                            <th style={S.th} style={{textAlign:"right"}}>Ruční úprava</th>
                          </tr>
                        </thead>
                        <tbody>
                          {recs.length===0?<tr><td colSpan={6} style={{...S.td,textAlign:"center",color:"#8a9a8a",padding:"1rem"}}>Tento zaměstnanec zatím nemá v tomto měsíci žádné záznamy.</td></tr>:
                            recs.map((r,idx)=>{
                              function setStatus(st){
                                const n=[...recs];
                                n[idx]={...r,status:st};
                                setAttendanceCloud(setUserRecords(attendance,log,n));
                              }
                              return (
                                <tr key={idx}>
                                  <td style={{...S.td,fontWeight:500}}>{r.date.split("-").reverse().join(".")}</td>
                                  <td style={S.td}>{r.in||"—"}</td>
                                  <td style={S.td}>{r.out||"—"}</td>
                                  <td style={{...S.td,fontWeight:600,color:"#2d5a27"}}>{calcHours(r.in,r.out)}</td>
                                  <td style={S.td}>
                                    <Badge type={r.status==="ok"?"green":r.status==="late"?"orange":"red"}>
                                      {r.status==="ok"?"V pořádku":r.status==="late"?"Pozdní příchod":"Absence"}
                                    </Badge>
                                  </td>
                                  <td style={{...S.td,textAlign:"right"}}>
                                    <select style={{...S.inp,padding:"3px 8px",width:"auto",fontSize:"0.78rem"}} value={r.status} onChange={e=>setStatus(e.target.value)}>
                                      <option value="ok">Schválit: OK</option>
                                      <option value="late">Označit: Pozdě</option>
                                      <option value="absence">Označit: Absence</option>
                                    </select>
                                  </td>
                                </tr>
                              );
                            })
                          }
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}
</script>
</body>
</html>
