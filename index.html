// Firebase inicializace
var db=null;
var fbReady=false;
try {
  if(!firebase.apps||firebase.apps.length===0) firebase.initializeApp(firebaseConfig);
  db=firebase.firestore();
  fbReady=true;
  console.log("✅ Firebase připojen");
} catch(e) {
  console.error("❌ Firebase chyba:", e);
}

// Firestore helpers
function fsSet(col,id,data){
  if(!db)return Promise.resolve();
  return db.collection(col).doc(id).set(data,{merge:true}).catch(e=>console.error("fsSet",e));
}
function fsDel(col,id){
  if(!db)return Promise.resolve();
  return db.collection(col).doc(id).delete().catch(e=>console.error("fsDel",e));
}
function fsListen(col,cb){
  if(!db)return function(){};
  return db.collection(col).onSnapshot(function(snap){
    var docs={};
    snap.forEach(function(d){docs[d.id]=d.data();});
    cb(docs);
  }, function(e){console.error("fsListen err",e);});
}
function fsListenArr(col,orderBy,cb){
  if(!db)return function(){};
  var q=db.collection(col);
  if(orderBy)q=q.orderBy(orderBy);
  return q.onSnapshot(function(snap){
    var arr=[];
    snap.forEach(function(d){arr.push(Object.assign({},d.data(),{_id:d.id}));});
    cb(arr);
  }, function(e){console.error("fsListenArr err",e);});
}

// ── HELPERS ──────────────────────────────────────────
const ORD=["adam","laura","peter","marta"];
function ckey(a,b){
  var s=[a,b].sort(function(x,y){
    var xi=ORD.indexOf(x)<0?99:ORD.indexOf(x);
    var yi=ORD.indexOf(y)<0?99:ORD.indexOf(y);
    return xi-yi;
  });
  return s[0]+"-"+s[1];
}
function hrs(i,o){
  if(!i||!o)return"—";
  var ih=parseInt(i.split(":")[0]),im=parseInt(i.split(":")[1]);
  var oh=parseInt(o.split(":")[0]),om=parseInt(o.split(":")[1]);
  var m=(oh*60+om)-(ih*60+im);
  return m>0?Math.floor(m/60)+":"+String(m%60).padStart(2,"0"):"—";
}
function ntime(){return new Date().toTimeString().slice(0,5);}
function ndate(){return new Date().toISOString().split("T")[0];}
function today(){return new Date().toLocaleDateString("cs-CZ",{weekday:"long",day:"numeric",month:"long"});}
