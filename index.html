const ORDER = ["adam","laura","peter","marta"];
function chatKey(a,b){
  const s=[a,b].sort((x,y)=>(ORDER.indexOf(x)===-1?99:ORDER.indexOf(x))-(ORDER.indexOf(y)===-1?99:ORDER.indexOf(y)));
  return s[0]+"-"+s[1];
}
function calcHours(inT,outT){
  if(!inT||!outT) return "—";
  const [ih,im]=inT.split(":").map(Number),[oh,om]=outT.split(":").map(Number);
  const m=(oh*60+om)-(ih*60+im);
  if(m<=0) return "—";
  return `${Math.floor(m/60)}:${String(m%60).padStart(2,"0")}`;
}
function nowTime(){ return new Date().toTimeString().slice(0,5); }
function nowDate(){ return new Date().toISOString().split("T")[0]; }
function todayLabel(){ return new Date().toLocaleDateString("cs-CZ",{weekday:"long",day:"numeric",month:"long"}); }
function isAdmin(cu){ return !!(cu && (cu.role==="admin" || cu.login==="adam")); }
function canAccessAdmin(cu){ return isAdmin(cu); }
function asArray(v){ if(Array.isArray(v)) return v; if(v&&typeof v==="object") return Object.values(v); return []; }
function normalizeTasks(raw){ return asArray(raw); }
function normalizeAttendance(raw,users){
  if(!raw) return {};
  if(Array.isArray(raw)){
    const m={};
    Object.keys(users).forEach(k=>{m[k]=[];});
    const first=Object.keys(users).find(k=>users[k].role!=="admin");
    if(first) m[first]=raw;
    return m;
  }
  return raw;
}
function getUserRecords(all,login){ return (all&&all[login])||[]; }
function setUserRecords(all,login,records){ return {...(all||{}),[login]:records}; }
function makeUpdater(setter,docName,onSyncEvent){
  return function(v){
    setter(prev=>{
      const n=typeof v==="function"?v(prev):v;
      if(window.cloudSave){
        onSyncEvent&&onSyncEvent("saving");
        window.cloudSave(docName,n).then(function(){
          onSyncEvent&&onSyncEvent("saved");
        }).catch(function(err){
          onSyncEvent&&onSyncEvent("error",err.message||String(err));
        });
      }
      return n;
    });
  };
}

function Modal({open, onClose, title, children}){
  if(!open) return null;
  return <div style={S.modalBg} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={S.modal}>
      <div style={{fontFamily:"'DM Serif Display',serif", fontSize:"1.3rem", color:"#2d5a27", marginBottom:"1.25rem"}}>{title}</div>
      {children}
    </div>
  </div>;
}

    const db=window.db;
    const collections=["users","passwords","msgs","tasks","attendance","announcements","meetings"];
    const setters={users:setUsers,passwords:setPasswords,msgs:setMsgs,tasks:setTasks,attendance:setAttendance,announcements:setAnnouncements,meetings:setMeetings};
    
    collections.forEach(name=>{
      db.collection("app").doc(name).onSnapshot(doc=>{
        if(doc.exists) setters[name](doc.data());
      });
    });
  },[]);

  const setUsersCloud = makeUpdater(setUsers,"users");
  const setPasswordsCloud = makeUpdater(setPasswords,"passwords");
  const setTasksCloud = makeUpdater(setTasks,"tasks");
  const setAttendanceCloud = makeUpdater(setAttendance,"attendance");

  function doLogin(){
    const u=users[loginUser.toLowerCase().trim()];
    if(!u){ setLoginErr("Uživatel neexistuje."); return; }
    if(passwords[loginUser.toLowerCase().trim()] !== loginPass){ setLoginErr("Nesprávné heslo."); return; }
    setCu({login:loginUser.toLowerCase().trim(), ...u});
  }

  function toggleAttendance(){
    const today=nowDate();
    const time=nowTime();
    const recs=[...(getUserRecords(attendance,cu.login))];
    if(!checkedIn){
      recs.unshift({date:today, in:time, out:"", status:"ok"});
      setCheckedIn(true);
    }else{
      if(recs[0]) recs[0].out=time;
      setCheckedIn(false);
    }
    setAttendanceCloud(setUserRecords(attendance,cu.login,recs));
  }

  if(!cu){
    return (
      <LoginScreen selRole={selRole} setSelRole={setSelRole} loginUser={loginUser} setLoginUser={setLoginUser} loginPass={loginPass} setLoginPass={setLoginPass} loginErr={loginErr} doLogin={doLogin} users={users} />
    );
  }

  return (
    <div style={S.app}>
      <div style={S.topbar}>
        <div style={S.topBrand}>🌿 Zahradní systém</div>
        <div style={S.topRight}>
          <div style={S.ubadge}>
            <Avatar initials={cu.initials} color={cu.color} />
            <span style={S.uname}>{cu.name}</span>
          </div>
          <Btn type="outline" onClick={()=>setCu(null)}>Odhlásit</Btn>
        </div>
      </div>

      <div style={{display:"flex", minHeight:"calc(100vh - 64px)"}}>
        <div style={S.sidebar}>
          <button style={S.nbtn(page==="dashboard")} onClick={()=>setPage("dashboard")}>🏠 Nástěnka</button>
          <button style={S.nbtn(page==="tasks")} onClick={()=>setPage("tasks")}>📋 Úkoly</button>
          <button style={S.nbtn(page==="attendance")} onClick={()=>setPage("attendance")}>📅 Docházka</button>
        </div>

        <div style={S.content}>
          {page==="dashboard" && (
            <div>
              <div style={S.welcome}>
                <h2 style={S.wh2}>Krásný den, {cu.name}!</h2>
                <p style={S.wp}>Vítejte v interním systému vaší zahrady.</p>
              </div>
              <div style={S.statGrid}>
                <div style={S.statCard}>
                  <div style={S.statLabel}>Docházka</div>
                  <Btn type={checkedIn?"danger":"primary"} sm onClick={toggleAttendance} style={{marginTop:8}}>
                    {checkedIn?"🔴 Odchod":"🟢 Příchod"}
                  </Btn>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function LoginScreen({selRole,setSelRole,loginUser,setLoginUser,loginPass,setLoginPass,loginErr,doLogin}){
  return (
    <div style={S.loginPage}>
      <div style={S.loginHero}>
        <h1 style={S.loginHeroTitle}>Zahradní systém</h1>
        <p style={S.loginHeroText}>Kompletní správa úkolů a docházky online.</p>
      </div>
      <div style={S.loginPanel}>
        <div style={S.loginCard}>
          <h2 style={{marginBottom:15}}>{selRole==="admin"?"Administrátor":"Zaměstnanec"}</h2>
          {loginErr && <div style={S.err}>{loginErr}</div>}
          <div style={S.fgroup}>
            <label style={S.flabel}>Jméno (login)</label>
            <input style={S.finput} value={loginUser} onChange={e=>setLoginUser(e.target.value)} placeholder="např. adam" />
          </div>
          <div style={S.fgroup}>
            <label style={S.flabel}>Heslo</label>
            <input style={S.finput} type="password" value={loginPass} onChange={e=>setLoginPass(e.target.value)} placeholder="••••••••" />
          </div>
          <button style={S.loginBtn(selRole==="admin")} onClick={doLogin}>Přihlásit se</button>
        </div>
      </div>
    </div>
  );
}

// Vykreslení aplikace (Kompatibilní s GitHub Pages)
const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(React.createElement(App));
</script>

</body>
</html>
